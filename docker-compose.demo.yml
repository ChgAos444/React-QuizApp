# Live demo stack — run the actual app locally for the presentation.
#
#   docker compose -f docker-compose.demo.yml up --build
#   → open http://localhost:3000   (questions come from the local backend on :9000)
#   stop with Ctrl+C, then: docker compose -f docker-compose.demo.yml down
#
# Works offline (no public API needed): the React app is built to talk to the
# local json-server backend at http://localhost:9000/questions.

services:
  backend:
    image: node:20-bullseye-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npx --yes json-server@0.17.4 --watch data/questions.json --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"

  frontend:
    build:
      context: .
      dockerfile: e2e.Dockerfile
      args:
        REACT_APP_API_URL: "http://localhost:9000/questions"
    ports:
      - "3000:3000"
    depends_on:
      - backend
