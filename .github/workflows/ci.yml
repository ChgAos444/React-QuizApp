name: CI Pipeline

# Runs the whole test pyramid on every push / PR to main:
#   1) unit + integration  (Jest + React Testing Library)
#   2) end-to-end          (Playwright against the Docker-isolated stack)
#   3) load                (k6 smoke run with SLO thresholds as a quality gate)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-integration:
    name: Unit & Integration (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Jest tests (unit + integration)
        run: npm test -- --watchAll=false
        env:
          CI: "true"

  e2e:
    name: End-to-End (Playwright, Docker-isolated)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E suite in the isolated Docker stack
        run: docker compose -f docker-compose.e2e.yml up --build --exit-code-from playwright
      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

  load:
    name: Load smoke (k6 + SLO gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start json-server backend
        run: |
          npm run server -- --host 0.0.0.0 &
          npx --yes wait-on http://localhost:9000/questions --timeout 60000
      - name: Run k6 constant-load test (thresholds fail the build)
        run: |
          docker run --rm --network host \
            -v "$PWD/load-tests:/scripts" \
            -e TARGET=http://localhost:9000 \
            grafana/k6 run /scripts/01-constant-load.js
